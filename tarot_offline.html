<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Oracle ✦ オフライン版</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0a14; --card-bg:#1a1528; --gold:#c9a84c; --gold-light:#e8c97a;
    --gold-dim:#6e5a2a; --purple:#6b3fa0; --purple-light:#9b6fc8;
    --text:#e8dfc8; --text-dim:#9e8e72; --border:rgba(201,168,76,.25); --shadow:rgba(0,0,0,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,63,160,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(30,15,60,.4) 0%,transparent 50%),radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.05) 0%,transparent 40%);pointer-events:none;z-index:0;}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur,3s) ease-in-out infinite;animation-delay:var(--delay,0s);opacity:0;}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(1);}50%{opacity:var(--brightness,.7);transform:scale(1.2);}}
  .container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 20px 80px;}

  header{text-align:center;margin-bottom:50px;}
  .header-ornament{color:var(--gold);font-size:1.2rem;letter-spacing:.5em;margin-bottom:8px;opacity:.6;}
  h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.8rem,5vw,3rem);color:var(--gold-light);text-shadow:0 0 30px rgba(201,168,76,.3),0 2px 4px rgba(0,0,0,.8);letter-spacing:.05em;line-height:1.2;margin-bottom:10px;}
  .subtitle{font-style:italic;color:var(--text-dim);font-size:1.1rem;letter-spacing:.1em;}
  .offline-badge{display:inline-block;margin-top:10px;padding:3px 14px;border:1px solid rgba(76,175,130,.5);border-radius:20px;font-size:.72rem;color:#4caf82;letter-spacing:.1em;}

  .panel{background:linear-gradient(135deg,rgba(26,21,40,.9),rgba(19,15,30,.95));border:1px solid var(--border);border-radius:12px;padding:24px 28px;margin-bottom:16px;box-shadow:0 4px 24px var(--shadow),inset 0 1px 0 rgba(201,168,76,.1);}
  .panel-title{font-family:'Cinzel Decorative',serif;font-size:.7rem;color:var(--gold);letter-spacing:.3em;text-transform:uppercase;margin-bottom:16px;opacity:.8;}

  .option-grid{display:flex;gap:10px;flex-wrap:wrap;}
  .opt-btn{flex:1;min-width:65px;padding:10px 6px;background:transparent;border:1px solid var(--gold-dim);border-radius:8px;color:var(--text-dim);font-family:'Cormorant Garamond',serif;cursor:pointer;transition:all .25s;text-align:center;}
  .opt-btn:hover,.opt-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.1);box-shadow:0 0 14px rgba(201,168,76,.15);}
  .num{display:block;font-size:1.4rem;font-weight:700;margin-bottom:2px;}
  .desc{display:block;font-size:.7rem;font-style:italic;opacity:.7;}

  .arcana-grid{display:flex;gap:10px;}
  .arcana-btn{flex:1;padding:10px;background:transparent;border:1px solid var(--gold-dim);border-radius:8px;color:var(--text-dim);font-family:'Cormorant Garamond',serif;cursor:pointer;transition:all .25s;text-align:center;}
  .arcana-btn:hover,.arcana-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.1);box-shadow:0 0 14px rgba(201,168,76,.15);}
  .arcana-btn .a-label{display:block;font-size:.9rem;font-weight:600;margin-bottom:2px;}
  .arcana-btn .a-desc{display:block;font-size:.7rem;opacity:.65;font-style:italic;}

  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  @media(max-width:500px){.theme-grid{grid-template-columns:repeat(2,1fr);}}
  .theme-btn{padding:10px 8px;background:transparent;border:1px solid var(--gold-dim);border-radius:8px;color:var(--text-dim);font-family:'Cormorant Garamond',serif;font-size:.9rem;cursor:pointer;transition:all .25s;text-align:center;line-height:1.4;}
  .theme-btn:hover,.theme-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.1);box-shadow:0 0 12px rgba(201,168,76,.12);}
  .theme-icon{display:block;font-size:1.3rem;margin-bottom:3px;}

  .toggles-row{display:flex;gap:16px;flex-wrap:wrap;}
  .toggle-wrap{display:flex;align-items:center;gap:12px;flex:1;min-width:180px;}
  .toggle-label{font-size:.95rem;color:var(--text-dim);flex:1;}
  .toggle{position:relative;width:54px;height:28px;flex-shrink:0;}
  .toggle input{display:none;}
  .toggle-track{position:absolute;inset:0;background:rgba(201,168,76,.15);border:1px solid var(--gold-dim);border-radius:14px;cursor:pointer;transition:all .3s;}
  .toggle input:checked~.toggle-track{background:rgba(201,168,76,.3);border-color:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.2);}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:var(--gold-dim);border-radius:50%;transition:all .3s;pointer-events:none;}
  .toggle input:checked~.toggle-track .toggle-thumb{left:29px;background:var(--gold-light);box-shadow:0 0 8px rgba(201,168,76,.5);}

  .draw-btn{width:100%;padding:18px;background:linear-gradient(135deg,rgba(107,63,160,.4),rgba(50,25,90,.6));border:1px solid var(--purple-light);border-radius:10px;color:var(--text);font-family:'Cinzel Decorative',serif;font-size:1rem;letter-spacing:.15em;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(107,63,160,.2);margin-bottom:16px;}
  .draw-btn:hover{border-color:var(--gold);color:var(--gold-light);box-shadow:0 4px 30px rgba(201,168,76,.2),0 0 60px rgba(107,63,160,.3);transform:translateY(-1px);}
  .draw-btn:active{transform:translateY(0);}
  .draw-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  .loading{text-align:center;padding:36px;display:none;}
  .loading-orb{width:48px;height:48px;border:2px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  #cards-area{display:none;}
  .cards-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
  .card-wrapper{opacity:0;transform:translateY(30px);transition:all .6s ease;text-align:center;cursor:pointer;}
  .card-wrapper.visible{opacity:1;transform:translateY(0);}
  .card-wrapper.selected .card-frame{border-color:var(--gold);box-shadow:0 0 30px rgba(201,168,76,.4),0 8px 32px var(--shadow);}
  .card-frame{width:120px;height:210px;border:2px solid var(--gold-dim);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--card-bg);margin:0 auto 10px;transition:all .3s;position:relative;box-shadow:0 4px 20px var(--shadow);}
  .card-frame:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.25),0 8px 24px var(--shadow);}
  .card-frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .card-frame.reversed img{transform:rotate(180deg);}
  .card-badge{position:absolute;top:6px;right:6px;background:rgba(13,10,20,.85);border:1px solid var(--gold-dim);border-radius:4px;padding:2px 6px;font-size:.6rem;color:var(--gold);letter-spacing:.05em;font-family:'Cinzel Decorative',serif;}
  .card-name{font-size:.82rem;color:var(--gold-light);font-style:italic;letter-spacing:.05em;margin-bottom:3px;}
  .card-pos-label{font-size:.68rem;color:var(--text-dim);letter-spacing:.1em;}
  .nav-hint{text-align:center;font-size:.83rem;color:var(--text-dim);font-style:italic;margin-bottom:20px;}

  /* 総合リーディングパネル */
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .overall-panel{background:linear-gradient(135deg,rgba(30,15,55,.95),rgba(20,10,40,.98));border:1px solid rgba(155,111,200,.4);border-radius:12px;padding:28px 32px;margin-bottom:16px;box-shadow:0 4px 30px rgba(107,63,160,.25),inset 0 1px 0 rgba(155,111,200,.15);animation:fadeIn .6s ease;}
  .overall-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(155,111,200,.2);}
  .overall-icon{font-size:1.6rem;}
  .overall-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--purple-light);letter-spacing:.1em;}
  .overall-subtitle{font-size:.82rem;color:var(--text-dim);font-style:italic;margin-top:2px;}
  .overall-theme-badge{display:inline-block;padding:3px 14px;border:1px solid rgba(155,111,200,.4);border-radius:20px;font-size:.72rem;color:var(--purple-light);margin-bottom:16px;}
  .overall-score-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .overall-score-label{font-family:'Cinzel Decorative',serif;font-size:.58rem;color:var(--gold);letter-spacing:.2em;opacity:.75;white-space:nowrap;}
  .overall-score-bar{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
  .overall-score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#c85050,#e8a030,#c9a84c,#4caf82);transition:width 1s ease;}
  .overall-score-val{font-size:.8rem;color:var(--text-dim);white-space:nowrap;}

  /* 流れセクション */
  .flow-section{margin-bottom:18px;}
  .flow-title{font-family:'Cinzel Decorative',serif;font-size:.62rem;color:var(--gold);letter-spacing:.28em;opacity:.75;margin-bottom:10px;}
  .flow-text{font-size:1.05rem;line-height:2;color:var(--text);font-weight:300;}
  .divider{border:none;border-top:1px solid rgba(155,111,200,.2);margin:18px 0;}

  /* カード別ミニ解説 */
  .card-messages{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
  .card-msg-row{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:rgba(13,10,20,.4);border-radius:8px;border-left:2px solid var(--gold-dim);}
  .card-msg-name{font-size:.78rem;color:var(--gold-light);font-style:italic;min-width:110px;flex-shrink:0;padding-top:2px;}
  .card-msg-text{font-size:.88rem;line-height:1.7;color:var(--text-dim);}

  /* 個別解説パネル */
  #reading-area{display:none;margin-top:0;}
  .reading-panel{background:linear-gradient(135deg,rgba(26,21,40,.95),rgba(19,15,30,.98));border:1px solid var(--border);border-radius:12px;padding:28px 32px;box-shadow:0 4px 24px var(--shadow);animation:fadeIn .6s ease;margin-bottom:16px;}
  .reading-card-title{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--gold-light);text-align:center;margin-bottom:6px;}
  .reading-position{text-align:center;font-style:italic;color:var(--text-dim);font-size:.88rem;margin-bottom:18px;}
  .reading-section-title{font-family:'Cinzel Decorative',serif;font-size:.62rem;color:var(--gold);letter-spacing:.3em;opacity:.7;margin-bottom:10px;}
  .reading-text{font-size:1.05rem;line-height:1.9;color:var(--text);font-weight:300;}
  .reading-keyword{display:inline-block;padding:3px 10px;border:1px solid var(--gold-dim);border-radius:20px;font-size:.78rem;color:var(--gold);margin:3px;}

  .reset-btn{display:none;margin:16px auto 0;padding:12px 32px;background:transparent;border:1px solid var(--gold-dim);border-radius:6px;color:var(--text-dim);font-family:'Cormorant Garamond',serif;font-size:.95rem;cursor:pointer;letter-spacing:.1em;transition:all .25s;font-style:italic;}
  .reset-btn:hover{border-color:var(--gold);color:var(--gold-light);}

  @media(max-width:600px){
    .panel{padding:18px 16px;}
    .card-frame{width:95px;height:166px;}
    .cards-grid{gap:10px;}
    .reading-panel,.overall-panel{padding:20px 16px;}
    .toggles-row{flex-direction:column;gap:12px;}
    .card-msg-name{min-width:88px;}
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <header>
    <div class="header-ornament">✦ ✦ ✦</div>
    <h1>Tarot Oracle</h1>
    <p class="subtitle">ライダー・ウェイト版タロット占い</p>
    <div class="offline-badge">✓ オフライン動作 · AI不要</div>
  </header>

  <div class="panel">
    <div class="panel-title">✦ 引く枚数</div>
    <div class="option-grid">
      <button class="opt-btn active" data-count="1"><span class="num">1</span><span class="desc">一枚引き</span></button>
      <button class="opt-btn" data-count="3"><span class="num">3</span><span class="desc">過去・現在・未来</span></button>
      <button class="opt-btn" data-count="5"><span class="num">5</span><span class="desc">ファイブカード</span></button>
      <button class="opt-btn" data-count="10"><span class="num">10</span><span class="desc">ケルト十字</span></button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">✦ 使用するカード</div>
    <div class="arcana-grid">
      <button class="arcana-btn active" data-arcana="major"><span class="a-label">大アルカナのみ</span><span class="a-desc">22枚 ／ 人生の大きな流れ</span></button>
      <button class="arcana-btn" data-arcana="all"><span class="a-label">全カード</span><span class="a-desc">78枚 ／ より詳細な読み</span></button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">✦ 何について占いますか？</div>
    <div class="theme-grid">
      <button class="theme-btn active" data-theme="overall"><span class="theme-icon">🌟</span>総合運</button>
      <button class="theme-btn" data-theme="fortune"><span class="theme-icon">✨</span>直近の運勢</button>
      <button class="theme-btn" data-theme="money"><span class="theme-icon">💰</span>金運</button>
      <button class="theme-btn" data-theme="work"><span class="theme-icon">💼</span>仕事運</button>
      <button class="theme-btn" data-theme="relation"><span class="theme-icon">🤝</span>対人運</button>
      <button class="theme-btn" data-theme="love"><span class="theme-icon">💕</span>恋愛運</button>
      <button class="theme-btn" data-theme="health"><span class="theme-icon">🌿</span>健康運</button>
      <button class="theme-btn" data-theme="creative"><span class="theme-icon">🎨</span>創造・才能</button>
      <button class="theme-btn" data-theme="spirit"><span class="theme-icon">🔮</span>心・精神面</button>
    </div>
  </div>

  <div class="panel">
    <div class="toggles-row">
      <div class="toggle-wrap">
        <span class="toggle-label">逆位置を含める</span>
        <label class="toggle"><input type="checkbox" id="reversed-toggle"><div class="toggle-track"><div class="toggle-thumb"></div></div></label>
      </div>

    </div>
  </div>

  <button class="draw-btn" id="draw-btn">✦ &nbsp; カードを引く &nbsp; ✦</button>

  <div class="loading" id="loading">
    <div class="loading-orb"></div>
    <p style="color:var(--text-dim);font-style:italic;">カードを読み解いています…</p>
  </div>

  <div id="cards-area">
    <div class="cards-grid" id="cards-grid"></div>
    <p class="nav-hint">カードをタップして個別の解説を見る</p>
    <div id="overall-area"></div>
    <div id="reading-area"><div class="reading-panel" id="reading-panel"></div></div>
    <button class="reset-btn" id="reset-btn">もう一度占う</button>
  </div>
</div>

<script>
// ===== タロットデータ =====
const TAROT_DATA = {
  "major_0":  {name:"愚者",       en:"The Fool",           score:2,  rscore:-1, keywords:["新しい始まり","自由","冒険","可能性"],       upright:"新しい出発のエネルギーが満ちています。直感を信じて、軽やかに踏み出すことで思いがけない豊かさが待っています。",    reversed:"準備不足や衝動的な行動への警告。一歩立ち止まり、冷静に見直す必要があります。"},
  "major_1":  {name:"魔術師",     en:"The Magician",       score:3,  rscore:0,  keywords:["意志力","創造","技術","行動力"],             upright:"目標を実現するための力がすべて揃っています。今こそ行動に移す最良のタイミングです。",                              reversed:"力を正しく活かせていない状態。焦りや自己欺瞞に注意が必要です。"},
  "major_2":  {name:"女教皇",     en:"The High Priestess", score:-1, rscore:-2, keywords:["直感","神秘","内省","知恵"],                 upright:"表面には見えない深い真実があります。静かに直感に耳を傾け、焦らず答えを待ちましょう。",                              reversed:"直感を無視しているサイン。内なる声に従うことが大切です。"},
  "major_3":  {name:"女帝",       en:"The Empress",        score:2,  rscore:0,  keywords:["豊かさ","創造","繁栄","母性"],               upright:"豊かさと繁栄のエネルギーが満ちています。感覚を大切にした選択が実を結ぶ時期です。",                                reversed:"創造力の停滞や執着への警告。自分自身を大切にすることを忘れないで。"},
  "major_4":  {name:"皇帝",       en:"The Emperor",        score:1,  rscore:-1, keywords:["権威","安定","構造","責任"],                 upright:"確固とした判断力と安定感があります。論理的に検討し、着実に進む時です。",                                            reversed:"柔軟さの欠如や支配への欲求。もう少し視野を広げる必要があります。"},
  "major_5":  {name:"法王",       en:"The Hierophant",     score:0,  rscore:-1, keywords:["伝統","教え","信仰","制度"],                 upright:"確立された知識や評判に従うことが吉。実績のある選択肢を選ぶ時期です。",                                            reversed:"従来の方法への疑問。自分自身の価値観に従って判断する必要があります。"},
  "major_6":  {name:"恋人",       en:"The Lovers",         score:2,  rscore:-1, keywords:["愛","選択","調和","価値観"],                 upright:"大切な選択の時。心の声に従い、本当に価値あるものを選ぶことが求められています。",                                    reversed:"価値観の対立や優柔不断。本当の望みを明確にして決断する勇気を。"},
  "major_7":  {name:"戦車",       en:"The Chariot",        score:3,  rscore:0,  keywords:["意志","勝利","前進","決断"],                 upright:"強い意志で目標に向かって前進する力があります。タイミングは今！勝利が待っています。",                                reversed:"衝動的な行動や方向性の喪失。本当に進むべき先を見定めてから動きましょう。"},
  "major_8":  {name:"力",         en:"Strength",           score:1,  rscore:-1, keywords:["強さ","勇気","忍耐","内なる力"],             upright:"しなやかな強さで困難を乗り越える力があります。焦らず、自分のペースで進みましょう。",                                reversed:"自信の喪失や感情のコントロールの難しさ。自分を信じて一歩ずつ進むことが大切。"},
  "major_9":  {name:"隠者",       en:"The Hermit",         score:-2, rscore:-3, keywords:["内省","孤独","智慧","探求"],                 upright:"今は立ち止まって内側と向き合う時。焦らず、静かな省察の中に答えが見つかります。",                                    reversed:"孤立への警告。信頼できる人に相談したり、もっと情報を集める必要があります。"},
  "major_10": {name:"運命の輪",   en:"Wheel of Fortune",   score:2,  rscore:-1, keywords:["運命","変化","好機","転換点"],               upright:"大きな変化のチャンスが訪れています。タイミングの波に乗ることで、豊かな展開が開けます。",                            reversed:"悪い流れに注意。今は急がず、流れが変わるのを待つ時かもしれません。"},
  "major_11": {name:"正義",       en:"Justice",            score:0,  rscore:-1, keywords:["公正","真実","バランス","責任"],             upright:"公正な判断と誠実さが大切。自分の行動に責任を持って選択することで良い結果が得られます。",                          reversed:"不誠実や不公正への警告。今一度、選択を見直す必要があります。"},

// カードを引く
function drawCards(count){
  const pool = selectedArcana === 'all' ? ALL_KEYS : MAJOR_KEYS;
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  return shuffled.slice(0,count).map(key=>({
    key, data:TAROT_DATA[key],
    reversed: reversedEnabled ? Math.random()<.5 : false
  }));
}

// スコア計算
function calcScore(cards){
  const raw = cards.reduce((s,c)=>s+(c.reversed?c.data.rscore:c.data.score),0);
  return raw/cards.length;
}

// 総合リーディング生成
function generateReading(cards){
  const theme = THEME_DATA[selectedTheme];
  const score = calcScore(cards);
  const pct   = Math.round(((score+3)/6)*100);

  // スコア帯判定
  const tier = score>=1.2 ? 'high' : score>=-0.5 ? 'mid' : 'low';
  const msgs = theme[tier];
  const mainMsg = msgs[Math.floor(Math.random()*msgs.length)];
  const adviceArr = theme.advice;
  const advice = adviceArr[Math.floor(Math.random()*adviceArr.length)];

  // ポジティブ/ネガティブカード抽出
  const posCards = cards.filter(c=>(c.reversed?c.data.rscore:c.data.score)>=1);
  const negCards = cards.filter(c=>(c.reversed?c.data.rscore:c.data.score)<=-1);

  // カード別ミニメッセージ
  const positions = SPREAD_POSITIONS[cards.length]||cards.map((_,i)=>`カード${i+1}`);
  const cardMsgs = cards.map((c,i)=>{
    const meaning = c.reversed ? c.data.reversed : c.data.upright;
    return {pos:positions[i], name:c.data.name, text:meaning, reversed:c.reversed};
  });

  // 追加文（ポジ/ネガ比率による）
  let flowExtra = '';
  if(posCards.length>negCards.length){
    flowExtra = `特に${posCards.map(c=>c.data.name).join('・')}のエネルギーがあなたを後押ししています。`;
  } else if(negCards.length>posCards.length){
    flowExtra = `${negCards.map(c=>c.data.name).join('・')}が示す課題を丁寧に受け止めることで、次の道が開けてきます。`;
  }

  return { mainMsg, advice, flowExtra, cardMsgs, score, pct, tier };
}

      const fb=document.createElement('div');
      fb.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;';
      fb.innerHTML=`<div style="font-size:1.8rem;color:#c9a84c;margin-bottom:6px">✦</div><div style="color:#c9a84c;font-size:.76rem;font-family:Cormorant Garamond,serif;line-height:1.3">${card.data.name}</div>`;
      frame.appendChild(fb);
    };
    const badge=document.createElement('div'); badge.className='card-badge'; badge.textContent=card.reversed?'逆':'正';
    frame.appendChild(img); frame.appendChild(badge);
    const nameEl=document.createElement('div'); nameEl.className='card-name'; nameEl.textContent=card.data.name;
    const posEl=document.createElement('div'); posEl.className='card-pos-label'; posEl.textContent=positions[i];
    wrapper.appendChild(frame); wrapper.appendChild(nameEl); wrapper.appendChild(posEl);
    wrapper.addEventListener('click',()=>showCardDetail(i,wrapper));
    grid.appendChild(wrapper);
    setTimeout(()=>wrapper.classList.add('visible'),i*150+100);
  });
}

// 個別カード解説
function showCardDetail(index, wrapper){
  document.querySelectorAll('.card-wrapper').forEach(w=>w.classList.remove('selected'));
  wrapper.classList.add('selected');
  const card=drawnCards[index];
  const positions=SPREAD_POSITIONS[drawnCards.length]||drawnCards.map((_,i)=>`カード ${i+1}`);
  const meaning=card.reversed?card.data.reversed:card.data.upright;
  const keywords=card.reversed?card.data.keywords.map(k=>k+'（逆）'):card.data.keywords;
  const panel=document.getElementById('reading-panel');
  panel.innerHTML=`
    <div class="reading-card-title">${card.data.name}（${card.data.en}）</div>
    <div class="reading-position">${positions[index]} ｜ ${card.reversed?'逆位置':'正位置'}</div>
    <hr class="divider">
    <div class="reading-section-title">✦ キーワード</div>
    <div style="margin-bottom:18px">${keywords.map(k=>`<span class="reading-keyword">${k}</span>`).join('')}</div>
    <hr class="divider">
    <div class="reading-section-title">✦ 解説</div>
    <p class="reading-text">${meaning}</p>`;
  const ra=document.getElementById('reading-area');
  ra.style.display='block';
  ra.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ドローボタン
document.getElementById('draw-btn').addEventListener('click',async()=>{
  const drawBtn=document.getElementById('draw-btn');
  const loading=document.getElementById('loading');
  const cardsArea=document.getElementById('cards-area');
  const resetBtn=document.getElementById('reset-btn');

  drawBtn.disabled=true;
  loading.style.display='block';
  cardsArea.style.display='none';
  document.getElementById('overall-area').innerHTML='';
  document.getElementById('reading-area').style.display='none';

  await new Promise(r=>setTimeout(r,700));

  drawnCards=drawCards(selectedCount);
  loading.style.display='none';
  cardsArea.style.display='block';
  resetBtn.style.display='block';

  renderCards(drawnCards);
  setTimeout(()=>renderOverall(drawnCards),500);
});

// リセット
document.getElementById('reset-btn').addEventListener('click',()=>{
  document.getElementById('draw-btn').disabled=false;
  document.getElementById('cards-area').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('overall-area').innerHTML='';
  document.getElementById('reading-area').style.display='none';
  drawnCards=[];
  window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
</html>
